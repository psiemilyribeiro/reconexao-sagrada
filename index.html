<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── Paleta do Quiz (creme quente · rosa · vinho · dourado) ── */
    --bg:        #f6eee4;     /* creme quente de fundo */
    --bg-soft:   #fbf6ef;
    --card:      #ffffff;
    --ink:       #2c2723;     /* texto principal */
    --ink-soft:  #5d544c;
    --muted:     #938880;
    --line:      rgba(44,39,35,.10);
    --primary:   #c75f6b;     /* rosa primário (CTA / seleção) */
    --primary-deep: #a23f53;
    --primary-soft: #fae6e8;  /* tint de seleção */
    --wine:      #7c2e46;     /* vinho — nome do perfil */
    --gold:      #c39a4e;     /* dourado — acentos premium */
    --gold-soft: #f5ead0;
    --ok:        #4f9a6a;
    --warn:      #d39a3e;
    --bad:       #cf5b54;
    --sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --serif: 'Fraunces', Georgia, serif;
    --ease: cubic-bezier(.16,1,.3,1);
    --bounce: cubic-bezier(.34,1.56,.64,1);
    --shadow: 0 14px 40px rgba(124,46,70,.10);
    --shadow-sm: 0 4px 16px rgba(44,39,35,.06);
  }

  html { -webkit-text-size-adjust: 100%; }
  body {
    background:
      radial-gradient(1100px 600px at 50% -10%, #fcf2e6 0%, transparent 60%),
      radial-gradient(800px 500px at 100% 110%, #f7e7e4 0%, transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.6;
    font-weight: 400;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
  }

  h1, h2, h3 { line-height: 1.2; letter-spacing: -.02em; font-weight: 700; }
  em { font-style: italic; }
  strong, b { font-weight: 700; }
  .em { font-family: var(--serif); font-style: italic; font-weight: 500; color: var(--primary); letter-spacing: 0; }
  .em-wine { font-family: var(--serif); font-style: italic; font-weight: 500; color: var(--wine); letter-spacing: 0; }

  .wordmark {
    font-family: var(--serif); font-style: italic; font-weight: 500;
    font-size: 1.02rem; letter-spacing: .04em; color: var(--primary);
    text-transform: uppercase;
  }
  .wordmark .x { color: var(--gold); font-style: normal; }

  /* ════════ TOPO FIXO ════════ */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: rgba(246,238,228,.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 13px 18px;
  }
  .topbar-inner { max-width: 540px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .back {
    border: none; background: rgba(124,46,70,.06); color: var(--ink-soft); cursor: pointer;
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 50%; font-size: 20px; line-height: 1;
    display: grid; place-items: center; transition: background .2s, transform .15s, color .2s;
  }
  .back:hover { background: var(--primary-soft); color: var(--primary); }
  .back:active { transform: scale(.92); }
  .back[hidden] { visibility: hidden; }
  .prog { flex: 1; height: 9px; background: rgba(124,46,70,.10); border-radius: 100px; overflow: hidden; }
  .prog-fill { height: 100%; width: 0; border-radius: 100px;
    background: linear-gradient(90deg, var(--gold), var(--primary)); transition: width .5s var(--ease); }
  .prog-pct { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 34px; text-align: right; font-variant-numeric: tabular-nums; }

  /* ════════ PALCO ════════ */
  .stage { min-height: 100dvh; display: flex; flex-direction: column; justify-content: center;
    padding: 86px 20px 36px; max-width: 540px; margin: 0 auto; width: 100%; }
  .screen { will-change: transform, opacity; }
  .in-fwd  { animation: inFwd .42s var(--ease) both; }
  .in-back { animation: inBack .42s var(--ease) both; }
  @keyframes inFwd  { from { opacity: 0; transform: translateX(34px); } to { opacity: 1; transform: none; } }
  @keyframes inBack { from { opacity: 0; transform: translateX(-34px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes popIn  { 0% { opacity: 0; transform: scale(.4); } 60% { transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes spin   { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .in-fwd, .in-back, .opt-anim, .pop { animation: none !important; }
    .prog-fill, .bar-fill, .ring-fg { transition: none !important; }
  }

  /* ════════ CABEÇALHO DE PERGUNTA ════════ */
  .kicker { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; color: var(--primary);
    background: var(--primary-soft); padding: 6px 13px; border-radius: 100px; margin-bottom: 18px; }
  .q-title { font-size: clamp(1.5rem, 5.6vw, 2.05rem); margin-bottom: 12px; letter-spacing: -.025em; }
  .q-sub { font-size: 1rem; color: var(--muted); margin-bottom: 24px; font-weight: 500; }
  .q-note { font-size: 13px; color: var(--muted); margin-top: 20px; text-align: center; }
  .q-note a { color: var(--muted); }

  /* ════════ OPÇÕES ════════ */
  .opts { display: flex; flex-direction: column; gap: 10px; }
  .opt-anim { animation: fadeUp .4s var(--ease) both; }
  .opt {
    display: flex; align-items: center; gap: 13px; width: 100%; text-align: left;
    background: var(--card); border: 2px solid transparent; box-shadow: var(--shadow-sm);
    border-radius: 17px; padding: 15px 16px; font-family: var(--sans); font-size: 16px; font-weight: 600;
    color: var(--ink); cursor: pointer; line-height: 1.35; position: relative; overflow: hidden;
    transition: border-color .18s, background .18s, transform .12s var(--bounce), box-shadow .2s;
  }
  .opt:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(124,46,70,.12); }
  .opt:active { transform: scale(.985); }
  .opt-emoji { font-size: 22px; line-height: 1; width: 40px; height: 40px; flex: 0 0 40px; border-radius: 12px;
    background: var(--bg-soft); display: grid; place-items: center; transition: background .18s, transform .2s; }
  .opt-tx { flex: 1; }
  .opt-check { width: 24px; height: 24px; flex: 0 0 24px; border-radius: 50%; border: 2px solid var(--line);
    display: grid; place-items: center; color: #fff; font-size: 13px; transition: background .15s, border-color .15s, transform .2s; }
  .opt.multi .opt-check { border-radius: 8px; }
  .opt.sel { border-color: var(--primary); background: var(--primary-soft); }
  .opt.sel .opt-emoji { background: #fff; transform: scale(1.06); }
  .opt.sel .opt-check { background: var(--primary); border-color: var(--primary); animation: popIn .3s var(--bounce) both; }

  /* ════════ ESCALA 1–5 ════════ */
  .scale { display: flex; gap: 8px; justify-content: space-between; margin: 10px 0 14px; }
  .sdot { flex: 1; aspect-ratio: 1; max-width: 70px; border-radius: 18px; border: 2px solid var(--line);
    background: var(--card); box-shadow: var(--shadow-sm); cursor: pointer; font-family: var(--sans);
    font-size: 1.25rem; font-weight: 700; color: var(--muted);
    display: grid; place-items: center; transition: all .18s var(--bounce); }
  .sdot:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-3px); }
  .sdot.sel { background: linear-gradient(160deg, var(--primary), var(--primary-deep)); border-color: transparent; color: #fff; transform: translateY(-3px) scale(1.04); box-shadow: 0 12px 26px rgba(167,63,83,.32); }
  .scale-ends { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); font-weight: 600; }
  .scale-ends span { max-width: 45%; }
  .scale-ends span:last-child { text-align: right; }

  /* ════════ BOTÃO ════════ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 11px; width: 100%;
    background: linear-gradient(150deg, var(--primary), var(--primary-deep)); color: #fff;
    font-family: var(--sans); font-size: 16px; font-weight: 700; letter-spacing: .01em;
    text-decoration: none; padding: 18px 26px; border: none; border-radius: 16px; cursor: pointer;
    box-shadow: 0 14px 32px rgba(167,63,83,.30); transition: transform .2s var(--bounce), box-shadow .2s, opacity .2s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(167,63,83,.40); }
  .btn:active { transform: scale(.98); }
  .btn[disabled] { opacity: .38; pointer-events: none; box-shadow: none; }
  .btn .arr { transition: transform .2s; }
  .btn:hover .arr { transform: translateX(4px); }
  .btn-wrap { margin-top: 24px; }
  .btn-note { font-size: 12.5px; color: var(--muted); text-align: center; margin-top: 13px; font-weight: 500; }

  /* ════════ LANDING ════════ */
  .landing { text-align: center; }
  .landing .wordmark { display: inline-block; margin-bottom: 22px; }
  .landing h1 { font-size: clamp(1.9rem, 7.6vw, 2.7rem); margin-bottom: 16px; letter-spacing: -.03em; }
  .landing .lead { font-size: 1.08rem; color: var(--ink-soft); max-width: 30ch; margin: 0 auto 26px; font-weight: 500; }
  .landing .lead b { color: var(--primary-deep); }
  .entry-q { font-size: 1.05rem; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
  .landing .opts { text-align: left; }
  .trust { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 26px; }
  .trust .pill { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); background: rgba(255,255,255,.7);
    border: 1px solid var(--line); border-radius: 100px; padding: 7px 14px; display: inline-flex; align-items: center; gap: 6px; }
  .stars { color: var(--gold); letter-spacing: 1px; }
  .legal { font-size: 11.5px; color: var(--muted); margin-top: 18px; line-height: 1.6; }
  .legal a { color: var(--muted); }

  /* ════════ INTERSTITIAL ════════ */
  .inter { text-align: center; }
  .inter .icon-pop { font-size: 56px; display: inline-block; margin-bottom: 8px; animation: popIn .5s var(--bounce) both, floaty 3.5s ease-in-out 1s infinite; }
  .inter .big-num { font-family: var(--serif); font-style: italic; font-weight: 600; color: var(--primary);
    font-size: clamp(2.8rem, 14vw, 4.4rem); line-height: 1; margin-bottom: 4px; animation: popIn .55s var(--bounce) both; }
  .inter h2 { font-size: clamp(1.55rem, 5.4vw, 2.1rem); margin-bottom: 16px; letter-spacing: -.025em; }
  .inter .quote { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: clamp(1.4rem, 5.2vw, 1.95rem);
    line-height: 1.32; color: var(--wine); margin-bottom: 18px; letter-spacing: -.01em; }
  .inter p { font-size: 1.05rem; color: var(--ink-soft); margin-bottom: 14px; font-weight: 500; }
  .inter .subline { color: var(--muted); margin-top: -6px; font-weight: 600; }
  .inter .stat { display: inline-block; background: var(--gold-soft); color: #7a5e1d; border-radius: 14px;
    padding: 13px 20px; font-size: 15px; font-weight: 600; margin: 8px 0; line-height: 1.45; }
  .inter .signed { font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--primary); margin-top: 12px; font-weight: 500; }
  .inter.on-dark { color: #fbeee9; }
  .stage.dark { background: linear-gradient(170deg, #3a2128, #2a1820); }
  .stage.dark .inter p { color: rgba(251,238,233,.8); }
  .stage.dark .inter .quote { color: #f4cfd0; }
  .stage.dark .kicker { background: rgba(199,95,107,.2); color: #f0b9bf; }

  /* ════════ BARRAS DE PERFIL ════════ */
  .bars { margin: 22px 0 6px; text-align: left; }
  .bar-row { margin-bottom: 15px; }
  .bar-row .bl { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 7px; }
  .bar-row .bl .lvl { font-weight: 700; }
  .bar-track { height: 10px; background: rgba(44,39,35,.08); border-radius: 100px; overflow: hidden; }
  .stage.dark .bar-track { background: rgba(255,255,255,.12); }
  .bar-fill { height: 100%; width: 0; border-radius: 100px; transition: width 1s var(--ease); }
  .lvl-baixa { color: var(--bad); } .bar-baixa { background: linear-gradient(90deg, #e0857f, var(--bad)); }
  .lvl-media { color: var(--warn); } .bar-media { background: linear-gradient(90deg, #e6bd76, var(--warn)); }
  .lvl-alta  { color: var(--ok);   } .bar-alta  { background: linear-gradient(90deg, #7fc298, var(--ok)); }

  .profile-card { background: linear-gradient(160deg, #fff, var(--primary-soft));
    border: 2px solid rgba(199,95,107,.3); border-radius: 20px; padding: 22px 20px; margin: 20px 0 4px;
    text-align: left; box-shadow: var(--shadow); animation: popIn .5s var(--bounce) both; }
  .profile-card .pname { font-family: var(--serif); font-style: italic; font-weight: 600; font-size: 1.55rem;
    color: var(--wine); margin-bottom: 9px; line-height: 1.15; }
  .profile-card p { font-size: 15.5px; margin: 0; color: var(--ink-soft); font-weight: 500; }
  .stage.dark .profile-card { background: linear-gradient(160deg, #45272f, #38202a); border-color: rgba(244,207,208,.25); }
  .stage.dark .profile-card .pname { color: #f4cfd0; }
  .stage.dark .profile-card p { color: rgba(251,238,233,.82); }

  /* ════════ REVEAL ════════ */
  .reveal { text-align: center; }
  .badge { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 800; letter-spacing: .08em;
    text-transform: uppercase; padding: 8px 16px; border-radius: 100px; margin-bottom: 16px; animation: popIn .5s var(--bounce) both; }
  .badge.alto { background: rgba(207,91,84,.14); color: var(--bad); }
  .badge.atencao { background: rgba(211,154,62,.16); color: #a9761f; }
  .reveal h2 { font-size: clamp(1.6rem, 5.6vw, 2.2rem); margin-bottom: 16px; }
  .metrics-line { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0 20px; }
  .metrics-line .m { font-size: 12.5px; font-weight: 600; background: #fff; border: 1px solid var(--line);
    border-radius: 100px; padding: 8px 14px; box-shadow: var(--shadow-sm); }
  .metrics-line .m b { font-weight: 800; }
  .diag-text { text-align: left; background: #fff; border-radius: 18px; padding: 22px; box-shadow: var(--shadow-sm);
    font-size: 16px; color: var(--ink-soft); font-weight: 500; }
  .section-label { font-family: var(--serif); font-style: italic; font-weight: 600; font-size: 1.5rem; color: var(--wine); margin: 32px 0 8px; }
  .timeline { text-align: left; margin: 8px 0; display: flex; flex-direction: column; gap: 12px; }
  .tl-step { display: flex; gap: 14px; background: #fff; border-radius: 16px; padding: 16px 18px; box-shadow: var(--shadow-sm);
    border-left: 4px solid var(--gold); animation: fadeUp .5s var(--ease) both; }
  .tl-step .tl-n { font-family: var(--serif); font-style: italic; font-weight: 600; color: var(--primary);
    font-size: 1rem; flex: 0 0 76px; line-height: 1.3; }
  .tl-step h3 { font-size: 1.08rem; margin-bottom: 3px; }
  .tl-step p { font-size: 14px; color: var(--muted); margin: 0; font-weight: 500; }
  .reveal-graph { display: flex; align-items: flex-end; justify-content: center; gap: 14px; height: 130px; margin: 26px 0 8px; }
  .reveal-graph .col { flex: 1; max-width: 90px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 8px; height: 100%; }
  .reveal-graph .bar2 { width: 100%; border-radius: 12px 12px 0 0; height: 0; transition: height 1s var(--ease); }
  .reveal-graph .lbl { font-size: 12px; color: var(--muted); font-weight: 700; }
  .meta-date { text-align: center; font-family: var(--serif); font-style: italic; font-weight: 600; font-size: 1.2rem; color: var(--wine); margin: 14px 0 4px; }
  .meta-date .dt { background: var(--gold-soft); padding: 2px 10px; border-radius: 8px; color: #7a5e1d; }

  /* ════════ EMILY ════════ */
  .emily { text-align: center; }
  .emily .photo { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; object-position: 50% 16%;
    margin: 0 auto 12px; display: block; border: 4px solid #fff; box-shadow: var(--shadow); animation: popIn .5s var(--bounce) both; }
  .emily .photo-cap { font-family: var(--serif); font-style: italic; color: var(--primary); font-size: 1.05rem; margin-bottom: 20px; }
  .emily .letter { text-align: left; font-size: 1.05rem; background: #fff; border-radius: 20px; padding: 26px 24px; box-shadow: var(--shadow); }
  .emily .letter p { margin-bottom: 15px; color: var(--ink-soft); font-weight: 500; }
  .emily .letter p:last-of-type { margin-bottom: 0; }
  .emily .punch { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: 1.3rem; color: var(--wine); line-height: 1.35; }
  .emily .sig { font-family: var(--serif); font-style: italic; font-weight: 600; font-size: 1.4rem; color: var(--primary); margin-top: 16px; }

  /* ════════ LOADING ════════ */
  .load-rows { text-align: left; max-width: 400px; margin: 4px auto 22px; display: flex; flex-direction: column; gap: 0; }
  .load-row { display: flex; align-items: center; gap: 13px; padding: 14px 0; font-size: 15.5px; font-weight: 600;
    color: var(--muted); border-bottom: 1px solid var(--line); transition: color .3s; }
  .load-row .dot { width: 26px; height: 26px; flex: 0 0 26px; border-radius: 50%; border: 2.5px solid var(--line);
    display: grid; place-items: center; font-size: 14px; color: #fff; transition: all .3s; }
  .load-row.done { color: var(--ink); }
  .load-row.done .dot { background: var(--ok); border-color: var(--ok); animation: popIn .35s var(--bounce) both; }
  .load-row.active .dot { border-color: var(--primary); border-top-color: transparent; animation: spin .8s linear infinite; }

  .micro-modal { position: fixed; inset: 0; z-index: 60; background: rgba(44,30,34,.55); backdrop-filter: blur(4px);
    display: grid; place-items: center; padding: 22px; animation: fadeUp .3s var(--ease) both; }
  .micro-card { background: var(--bg-soft); border-radius: 22px; padding: 30px 24px; max-width: 380px; width: 100%;
    text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,.3); animation: popIn .4s var(--bounce) both; }
  .micro-card h3 { font-size: 1.35rem; margin-bottom: 20px; }
  .micro-opts { display: flex; gap: 12px; }
  .micro-opts button { flex: 1; padding: 16px; border-radius: 14px; border: 2px solid var(--line); background: #fff;
    font-family: var(--sans); font-size: 16px; font-weight: 700; color: var(--ink); cursor: pointer; transition: all .15s var(--bounce); }
  .micro-opts button:hover { border-color: var(--primary); background: var(--primary-soft); transform: translateY(-2px); }
  .micro-opts button:active { transform: scale(.96); }

  .testi { background: #fff; border-radius: 18px; padding: 18px 20px; text-align: left; margin-top: 6px; box-shadow: var(--shadow); animation: fadeUp .4s var(--ease) both; }
  .testi .th { display: flex; align-items: center; gap: 11px; margin-bottom: 9px; }
  .testi .th img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex: 0 0 44px; }

function pushDL(event, extra) { window.dataLayer = window.dataLayer || []; window.dataLayer.push(Object.assign({ event }, extra || {})); try { SB.track(event, extra); } catch (e) {} }

function applyScore(step, value) {
  if (step._scored) return;
  if (step.kind === 'scale' && step.scaleScore) {
    const s = step.scaleScore(value); if (s) for (const k in s) add(k, s[k]);
  } else if (Array.isArray(value)) {
    step.opts.forEach(o => { if (o.score && value.includes(o.v)) for (const k in o.score) add(k, o.score[k]); });
  } else {
    const o = (step.opts || []).find(o => o.v === value);
    if (o && o.score) for (const k in o.score) add(k, o.score[k]);
  }
  step._scored = true;
}

function setProgress(step) {
  let pct = 0, show = false;
  if (step.type === 'question') { pct = (step.qi / 26) * 100; show = true; }
  else if (step.type === 'cover' || step.type === 'entryq') { pct = 0; }
  else if (['reveal','emily','loading','offer'].includes(step.type)) { pct = 100; show = true; }
  else { const lastQ = FLOW.slice(0, idx).filter(s => s.type === 'question').pop(); pct = lastQ ? (lastQ.qi / 26) * 100 : 6; }
  pFill.style.width = pct + '%';
  backBtn.hidden = (idx === 0 || step.type === 'loading' || step.type === 'offer');
}

function go() { navDir = 1; idx++; render(); }

function render() {
  const step = FLOW[idx];
  setProgress(step);
  window.scrollTo(0, 0);
  const r = ({ cover:renderCover, entryq:renderEntry, question:renderQuestion, interstitial:renderInterstitial,
               reveal:renderReveal, emily:renderEmily, loading:renderLoading, offer:renderOffer })[step.type];
  stage.className = 'stage' + (step.dark ? ' dark' : '');
  stage.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'screen ' + (navDir === 1 ? 'in-fwd' : 'in-back');
  r(step, el);
  stage.appendChild(el);
}

function renderQuestion(step, el) {
  const head = `<h2 class="q-title">${step.title}</h2>${step.sub ? `<p class="q-sub">${step.sub}</p>` : ''}`;
  if (step.kind === 'scale') { renderScale(step, el, head); return; }

  const multi = step.kind === 'multi';
  el.innerHTML = head + `<div class="opts" id="opts"></div><div id="reactNote"></div>
    ${multi ? `<div class="btn-wrap"><button class="btn" id="contBtn" disabled>Continuar <span class="arr">→</span></button></div>` : ''}
    ${step.skippable ? `<p class="q-note"><a href="#" id="skip">Prefiro pular essa</a></p>` : ''}`;

  const box = el.querySelector('#opts');
  const cur = multi ? (A[step.id] || []) : A[step.id];
  step.opts.forEach((o, i) => {
    const sel = multi ? cur.includes(o.v) : false;
    const b = document.createElement('button');
    b.className = 'opt opt-anim' + (multi ? ' multi' : '') + (sel ? ' sel' : '');
    b.style.animationDelay = (i * 0.045) + 's';
    b.innerHTML = `<span class="opt-emoji">${o.ic || '•'}</span><span class="opt-tx">${o.tx}</span><span class="opt-check">${sel?'✓':''}</span>`;
    b.addEventListener('click', () => {
      if (multi) {
        let arr = A[step.id] || [];
        if (arr.includes(o.v)) arr = arr.filter(x => x !== o.v); else arr = arr.concat(o.v);
        A[step.id] = arr;
        b.classList.toggle('sel'); b.querySelector('.opt-check').textContent = arr.includes(o.v) ? '✓' : '';
        el.querySelector('#contBtn').disabled = arr.length === 0;
      } else {
        if (b.dataset.lock) return;
        A[step.id] = o.v; applyScore(step, o.v);
        pushDL('quiz_answer', { q: step.id, a: o.v });
        box.querySelectorAll('.opt').forEach(x => { x.classList.remove('sel'); x.dataset.lock = '1'; });
        b.classList.add('sel');
        if (step.reactiveNote && step.reactiveNote()) {
          el.querySelector('#reactNote').innerHTML =
            `<div class="profile-card" style="margin-top:18px"><p style="font-family:var(--serif);font-style:italic;font-size:1.05rem">${step.reactiveNote()}</p></div>

function microQuestion(q, cb) {

}

<!-- ✦ PRESERVAÇÃO DE PARÂMETROS / RASTREIO (mesmo da página de vendas) ✦ -->
<script defer>
(function () {
    let parametros = ["utm_source"];
    const url = new URL(window.location.href);
    const params = new URLSearchParams(url.search);
    for (const [key] of params) { if (!parametros.includes(key)) { parametros.push(key); } }
    const urlParamsCapt = new URLSearchParams(window.location.search);
    const urlParamsCaptReferrer = new URLSearchParams(document.referrer.split('?')[1] || '');
    let utms = {};
    parametros.forEach(el => {
        if (el === "utm_source") {
            utms[el] = urlParamsCapt.get(el) ?? (document.referrer ? (urlParamsCaptReferrer.get(el) ?? new URL(document.referrer).hostname) : "direto");
        } else {
            utms[el] = urlParamsCapt.get(el) ?? (urlParamsCaptReferrer.get(el) ?? "");
        }
    });
    let scks = Object.values(utms).filter(value => value !== "");
    let currentSckValues = [];
    if (urlParamsCapt.get('sck')) { currentSckValues = urlParamsCapt.get('sck').split('|'); }
    scks = scks.filter(value => !currentSckValues.includes(value));
    const updateLinks = (el, elURL) => {
        const elSearchParams = new URLSearchParams(elURL.search);
        let modified = false;
        for (let key in utms) {
            if (!elSearchParams.has(key)) { elSearchParams.append(key, utms[key]); modified = true; }
        }
        if (!elSearchParams.has('sck') && scks.length > 0) { elSearchParams.append('sck', scks.join('|')); modified = true; }
        if (modified) { return elURL.origin + elURL.pathname + "?" + elSearchParams.toString(); }
        return el.href;
    };
    document.addEventListener('click', function (ev) {
        const a = ev.target.closest && ev.target.closest('a[href*="pay.hotmart.com"]');
        if (!a) return;
        const elURL = new URL(a.href);
        a.href = updateLinks(a, elURL);
    }, true);
})();
</script>

<!-- ✦ RASTREAMENTO DE VARIANTE / UTM → Hotmart (igual página de vendas) ✦ -->
<script>
(function () {
  var params   = new URLSearchParams(window.location.search);
  var variante = params.get('variante') || 'quiz';
  var utmSource   = params.get('utm_source')   || '';
  var utmMedium   = params.get('utm_medium')   || '';
  var utmCampaign = params.get('utm_campaign') || '';
  var utmContent  = params.get('utm_content')  || '';
  var utmTerm     = params.get('utm_term')     || '';
  var fbclid      = params.get('fbclid')       || '';
  var gclid       = params.get('gclid')        || '';
  var src = 'quiz_' + variante;
  window.__buildHotmart = function (a) {
    try {
      var url = new URL(a.href);
      url.searchParams.set('src', src);
      if (utmSource)   url.searchParams.set('utm_source',   utmSource);
      if (utmMedium)   url.searchParams.set('utm_medium',   utmMedium);
      if (utmCampaign) url.searchParams.set('utm_campaign', utmCampaign);
      if (utmContent)  url.searchParams.set('utm_content',  utmContent);
      if (utmTerm)     url.searchParams.set('utm_term',     utmTerm);
      if (fbclid)      url.searchParams.set('fbclid',       fbclid);
      if (gclid)       url.searchParams.set('gclid',        gclid);
      a.href = url.toString();
    } catch (e) {}
  };
  document.addEventListener('click', function (ev) {
    var a = ev.target.closest && ev.target.closest('a[href*="pay.hotmart.com"]');
    if (a) window.__buildHotmart(a);
  }, true);
})();
</script>
